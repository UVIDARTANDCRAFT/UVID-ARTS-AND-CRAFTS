<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UVID Arts and Crafts</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#222;
color:white;
padding:20px;
text-align:center;
}

.search-box{
padding:20px;
text-align:center;
}

.search-box input{
width:90%;
max-width:500px;
padding:12px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.product h3{
margin:10px 0;
}

.price{
font-size:18px;
font-weight:bold;
}

button{
background:#25D366;
border:none;
color:white;
padding:10px;
width:100%;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

.cart-box{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

.cart-count{
position:fixed;
right:15px;
top:15px;
background:red;
color:white;
padding:10px 15px;
border-radius:30px;
font-weight:bold;
}

input.checkout{
width:100%;
padding:10px;
margin:10px 0;
}
</style>
</head>

<body>

<header>
<h1>UVID Arts and Crafts</h1>
<p>Order directly on WhatsApp</p>
</header>

<div class="cart-count">
Cart: <span id="cartCount">0</span>
</div>

<div class="search-box">
<input
type="text"
id="search"
placeholder="Search products..."
onkeyup="renderProducts()">
</div>

<div id="products" class="products"></div>

<div class="cart-box">
<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<input
class="checkout"
id="customerName"
placeholder="Your Name">

<input
class="checkout"
id="customerPhone"
placeholder="Phone Number">

<button onclick="checkoutWhatsApp()">
Order on WhatsApp
</button>
</div>

<script>

const SUPABASE_URL = "https://uhhyxilritfvcygnyqyp.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_JHgNBbOApKSF0b_7d1YljA_ytdqf_iO";

let products = [];

async function loadProducts() {

const response = await fetch(
`${SUPABASE_URL}/rest/v1/products?select=*`,
{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
}
);

products = await response.json();
  console.log(products);

products = products.map(product => ({
name: product.name,
price: product.price,
image: `${SUPABASE_URL}/storage/v1/object/public/products/${product.image_path}`
}));

renderProducts();

}

loadProducts();

let cart=[];

function renderProducts(){

const search =
document.getElementById("search")
.value
.toLowerCase();

let html="";

products
.filter(p =>
p.name.toLowerCase().includes(search)
)
.forEach(product=>{

html += `
<div class="product">
<img src="${product.image}">
<h3>${product.name}</h3>
<div class="price">₹${product.price}</div>

<button onclick="addToCart('${product.name}',${product.price})">
Add To Cart
</button>
</div>
`;

});

document.getElementById("products")
.innerHTML = html;

}

function addToCart(name,price){

cart.push({name,price});

document.getElementById("cartCount")
.innerText = cart.length;

renderCart();

}

function renderCart(){

let html="";

cart.forEach(item=>{

html += `
<li>${item.name} - ₹${item.price}</li>
`;

});

document.getElementById("cartItems")
.innerHTML = html;

}

function checkoutWhatsApp(){

let customerName =
document.getElementById("customerName").value;

let customerPhone =
document.getElementById("customerPhone").value;

let message =
`Hello UVID Arts and Crafts

Name: ${customerName}
Phone: ${customerPhone}

Order:

`;

cart.forEach(item=>{

message += `${item.name} - ₹${item.price}\n`;

});

window.open(
`https://wa.me/919972790229?text=${encodeURIComponent(message)}`
);

}

renderProducts();

</script>

</body>
</html>
