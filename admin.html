<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UVID Admin</title>

<style>

body{
font-family:Arial,sans-serif;
max-width:700px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

#status{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>UVID Admin Panel</h1>

<input id="name" placeholder="Product Name">

<input id="price" type="number" placeholder="Price">

<input id="photo" type="file">

<button onclick="saveProduct()">
Save Product
</button>

<div id="status"></div>

<script>

const SUPABASE_URL = "https://uhhyxilritfvcygnyqyp.supabase.co";

const SUPABASE_KEY = "sb_publishable_JHgNBbOApKSF0b_7d1YljA_ytdqf_iO";

async function saveProduct(){

const name =
document.getElementById("name").value;

const price =
document.getElementById("price").value;

const file =
document.getElementById("photo").files[0];

if(!name || !price || !file){

alert("Please fill all fields");

return;

}

document.getElementById("status").innerHTML =
"Uploading image...";

const fileName =
Date.now() + "-" + file.name;

const uploadResponse =
await fetch(
`${SUPABASE_URL}/storage/v1/object/products/${fileName}`,
{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
},
body:file
}
);

if(!uploadResponse.ok){

document.getElementById("status").innerHTML =
"Image upload failed";

return;

}

document.getElementById("status").innerHTML =
"Saving product...";

const saveResponse =
await fetch(
`${SUPABASE_URL}/rest/v1/products`,
{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Content-Type":"application/json",
Prefer:"return=representation"
},
body:JSON.stringify({
name:name,
price:Number(price),
image_path:fileName
})
}
);

if(saveResponse.ok){

document.getElementById("status").innerHTML =
"✅ Product Added Successfully";

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("photo").value="";

}else{

document.getElementById("status").innerHTML =
"❌ Product Save Failed";

}

}

</script>

</body>
</html>
